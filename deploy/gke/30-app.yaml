apiVersion: v1
kind: Service
metadata:
  name: multica-backend
  namespace: multica
  annotations:
    networking.gke.io/app-protocols: '{"http":"HTTP"}'
spec:
  type: ClusterIP
  selector:
    app: multica-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-backend
  namespace: multica
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: multica-backend
  template:
    metadata:
      labels:
        app: multica-backend
    spec:
      containers:
        - name: backend
          image: asia-east1-docker.pkg.dev/lifeerp/multica/multica-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: multica-env
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: multica-web
  namespace: multica
spec:
  type: ClusterIP
  selector:
    app: multica-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-web
  namespace: multica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multica-web
  template:
    metadata:
      labels:
        app: multica-web
    spec:
      containers:
        - name: web
          image: asia-east1-docker.pkg.dev/lifeerp/multica/multica-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: https://ai.licodes.net
            - name: NEXT_PUBLIC_APP_URL
              value: https://ai.licodes.net
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
