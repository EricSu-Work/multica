apiVersion: v1
kind: Service
metadata:
  name: multica-postgres
  namespace: multica
spec:
  clusterIP: None
  selector:
    app: multica-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: multica-postgres
  namespace: multica
spec:
  serviceName: multica-postgres
  replicas: 1
  selector:
    matchLabels:
      app: multica-postgres
  template:
    metadata:
      labels:
        app: multica-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: multica
            - name: POSTGRES_USER
              value: multica
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: multica-postgres-pw
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "multica", "-d", "multica"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "multica", "-d", "multica"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard-rwo
        resources:
          requests:
            storage: 20Gi
