apiVersion: v1
kind: Secret
metadata:
  name: multica-postgres-pw
  namespace: multica
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_ME_PG_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: multica-env
  namespace: multica
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_ME_JWT_SECRET_64HEX"
  DATABASE_URL: "postgres://multica:REPLACE_ME_PG_PASSWORD@multica-postgres:5432/multica?sslmode=disable"
  APP_ENV: "production"
  ALLOW_SIGNUP: "false"
  FRONTEND_ORIGIN: "https://ai.licodes.net"
  MULTICA_APP_URL: "https://ai.licodes.net"
  PORT: "8080"
  # MULTICA_DEV_VERIFICATION_CODE intentionally unset in production.
  # Email codes will be printed to backend log until RESEND_API_KEY is configured.
  # RESEND_API_KEY: ""
  # RESEND_FROM_EMAIL: "noreply@licodes.net"
